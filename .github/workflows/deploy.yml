# 靜態輸出（output: 'export'）+ 部署到 GitHub Pages。
# 前置需求（在 repo Settings → Pages）：Source 選「GitHub Actions」（不是 branch）。
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - name: Build (static export)
        run: npm run build
        env:
          # 自訂網域（public/CNAME），從網域根目錄 serve，不需要 basePath。
          # 換回 github.io 預設網址的話：NEXT_PUBLIC_SITE_ORIGIN 改
          # https://lyztw-tech.github.io、NEXT_PUBLIC_BASE_PATH 補回 /ssp-website，
          # 並把 public/CNAME 刪掉。
          NEXT_PUBLIC_SITE_ORIGIN: https://about.smart-safety-platform.lyztw.com
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
